# Excalidraw 反向代理配置（用于 http://117.50.174.50/ 外网访问）
# 使前端和协作服务都通过 80 端口，无需单独开放 3002
#
# 使用方法：
#   1. 复制到 nginx: sudo cp nginx-excalidraw.conf /etc/nginx/sites-available/excalidraw
#   2. 启用: sudo ln -s /etc/nginx/sites-available/excalidraw /etc/nginx/sites-enabled/
#   3. 测试: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name 117.50.174.50;  # 或使用 _ 匹配任意

    # Excalidraw 前端 (Vite dev 或 build 后的静态文件)
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        # Vite HMR
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # 协作服务 WebSocket (excalidraw-room)
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
